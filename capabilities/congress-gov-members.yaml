naftiko: 1.0.0-alpha2
info:
  label: Library of Congress Congress.gov API — Members
  description: 'Library of Congress Congress.gov API — Members. 2 operations. Lead operation: List Members. Self-contained
    Naftiko capability covering one Library Of Congress business surface.'
  tags:
  - Library Of Congress
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LIBRARY_OF_CONGRESS_API_KEY: LIBRARY_OF_CONGRESS_API_KEY
capability:
  consumes:
  - type: http
    namespace: congress-gov-members
    baseUri: https://api.congress.gov/v3
    description: Library of Congress Congress.gov API — Members business capability. Self-contained, no shared references.
    resources:
    - name: member
      path: /member
      operations:
      - name: listmembers
        method: GET
        description: List Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: member-bioguideId
      path: /member/{bioguideId}
      operations:
      - name: getmember
        method: GET
        description: Get Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bioguideId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.LIBRARY_OF_CONGRESS_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: congress-gov-members-rest
    port: 8080
    description: REST adapter for Library of Congress Congress.gov API — Members. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/member
      name: member
      description: REST surface for member.
      operations:
      - method: GET
        name: listmembers
        description: List Members
        call: congress-gov-members.listmembers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/member/{bioguideid}
      name: member-bioguideid
      description: REST surface for member-bioguideId.
      operations:
      - method: GET
        name: getmember
        description: Get Member
        call: congress-gov-members.getmember
        with:
          bioguideId: rest.bioguideId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: congress-gov-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Library of Congress Congress.gov API — Members. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-members
      description: List Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: congress-gov-members.listmembers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-member
      description: Get Member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: congress-gov-members.getmember
      with:
        bioguideId: tools.bioguideId
      outputParameters:
      - type: object
        mapping: $.
